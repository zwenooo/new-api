{{define "auth_form"}}
<div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">
  <div class="bg-white rounded shadow-lg w-full max-w-lg">
    <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center">
      <h3 class="text-lg font-semibold">填写 auth.json · Instance {{.Instance.ID}}</h3>
      <button type="button" class="btn px-2 py-1 text-sm" hx-get="{{mount "/admin/close"}}" hx-target="#modal" hx-swap="innerHTML">✕</button>
    </div>
    <form class="px-6 py-4 space-y-4" hx-post="{{mount "/admin/instances"}}/{{.Instance.ID}}/auth?state={{.ActiveTab}}&view={{.ViewMode}}" hx-target="#instances-table" hx-swap="outerHTML">
      <div>
        <label class="block text-sm font-medium text-slate-700">auth.json content</label>
        <textarea name="auth_json" rows="10" class="mt-1 block w-full rounded border-slate-300 focus:border-slate-500 focus:ring-slate-500 font-mono text-sm" placeholder='{ "access_token": "..." }' required>{{.Content}}</textarea>
      </div>
      <label class="inline-flex items-center gap-2 text-sm text-slate-700">
        <input type="checkbox" name="enable" value="true" checked class="rounded border-slate-300">
        保存后自动启动（enable）
      </label>
      <p class="text-xs text-slate-500">将保存到 SQLite 数据库（instance_auth）</p>
      <div class="flex justify-end space-x-3 pt-2">
        <button type="button" class="btn px-4 py-2 text-sm" hx-get="{{mount "/admin/close"}}" hx-target="#modal" hx-swap="innerHTML">取消</button>
        <button type="submit" class="btn px-4 py-2 text-sm">保存</button>
      </div>
    </form>
  </div>
</div>
{{end}}
