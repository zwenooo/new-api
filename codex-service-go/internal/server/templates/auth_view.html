{{define "auth_view"}}
<div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">
  <div class="bg-white rounded shadow-lg w-full max-w-2xl">
    <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center">
      <h3 class="text-lg font-semibold">Auth · Instance {{.Instance.ID}}</h3>
      <button type="button" class="btn px-2 py-1 text-sm" hx-get="{{mount "/admin/close"}}" hx-target="#modal" hx-swap="innerHTML">✕</button>
    </div>
    <div class="px-6 py-4 space-y-4">
      <div class="text-sm text-slate-600">存储：<code>SQLite / instance_auth</code></div>
      <pre class="bg-slate-900 text-slate-100 text-sm rounded p-4 max-h-96 overflow-auto whitespace-pre-wrap">{{.Content}}</pre>
      <p class="text-xs text-slate-500">可使用上方按钮替换内容，或点击关闭返回列表。</p>
    </div>
    <div class="px-6 py-4 border-t border-slate-200 flex justify-end space-x-3">
      <button type="button" class="btn px-4 py-2 text-sm" hx-get="{{mount "/admin/instances"}}/{{.Instance.ID}}/auth?state={{.ActiveTab}}&view={{.ViewMode}}" hx-target="#modal">替换</button>
      <button type="button" class="btn px-4 py-2 text-sm" hx-get="{{mount "/admin/close"}}" hx-target="#modal" hx-swap="innerHTML">关闭</button>
    </div>
  </div>
</div>
{{end}}
