<script>
  let copyBubbleEl;
  let copyBubbleTimer;

  function getCopyAnchor(el, evt) {
    if (evt && typeof evt.clientX === 'number' && typeof evt.clientY === 'number') {
      return { x: evt.clientX, y: evt.clientY };
    }
    if (el && el.getBoundingClientRect) {
      const rect = el.getBoundingClientRect();
      return { x: rect.left + rect.width / 2, y: rect.top };
    }
    return { x: Math.floor(window.innerWidth / 2), y: 24 };
  }

  function showCopyBubble(anchor, text) {
    if (!copyBubbleEl) {
      copyBubbleEl = document.createElement('div');
      copyBubbleEl.className = 'copy-bubble';
      document.body.appendChild(copyBubbleEl);
    }
    copyBubbleEl.textContent = text || '已复制';
    copyBubbleEl.classList.add('show');
    const bubbleRect = copyBubbleEl.getBoundingClientRect();
    const pad = 8;
    let left = anchor.x - bubbleRect.width / 2;
    left = Math.max(pad, Math.min(window.innerWidth - bubbleRect.width - pad, left));
    let top = anchor.y - bubbleRect.height - 10;
    if (top < pad) top = anchor.y + 10;
    copyBubbleEl.style.left = left + 'px';
    copyBubbleEl.style.top = top + 'px';
    clearTimeout(copyBubbleTimer);
    copyBubbleTimer = setTimeout(function () {
      if (copyBubbleEl) copyBubbleEl.classList.remove('show');
    }, 1200);
  }

  document.body.addEventListener('toast', function (e) {
    const detail = e && e.detail;
    const msg = typeof detail === 'string' ? detail : (detail && typeof detail.message === 'string' ? detail.message : '');
    if (!msg) return;
    showCopyBubble({ x: Math.floor(window.innerWidth / 2), y: 24 }, msg);
  });

  document.addEventListener('change', function (e) {
    const el = e && e.target;
    if (!el) return;
    if (el.matches("input[type='checkbox'][name='ids']")) syncSelectionStates();
  });

  function copyText(value, el, evt) {
    const text = String(value || '');
    const anchor = getCopyAnchor(el, evt);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        showCopyBubble(anchor, '已复制');
      }).catch(function () { fallbackCopy(text, anchor); });
      return;
    }
    fallbackCopy(text, anchor);
  }
  function fallbackCopy(text, anchor) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) showCopyBubble(anchor, '已复制');
    } catch {}
  }

  function formatCountdownCN(totalSeconds) {
    const s = Math.max(0, Math.floor(Number(totalSeconds) || 0));
    const days = Math.floor(s / 86400);
    const hours = Math.floor((s % 86400) / 3600);
    const minutes = Math.floor((s % 3600) / 60);
    const seconds = s % 60;
    return days + '天' + hours + '时' + minutes + '分' + seconds + '秒';
  }

  function updateCountdowns() {
    const now = Math.floor(Date.now() / 1000);
    document.querySelectorAll('[data-countdown-to]').forEach(function (el) {
      const to = Number(el.dataset.countdownTo);
      if (!to) return;
      const diff = to - now;
      let text;
      if (diff <= 0) {
        text = el.dataset.countdownExpired || formatCountdownCN(0);
        const fire = el.dataset.countdownFire;
        if (fire && !el.dataset.countdownFired) {
          el.dataset.countdownFired = '1';
          document.body.dispatchEvent(new Event(fire));
        }
      } else {
        text = formatCountdownCN(diff);
      }
      const prefix = el.dataset.countdownPrefix || '';
      const suffix = el.dataset.countdownSuffix || '';
      el.textContent = prefix + text + suffix;
    });
  }

  updateCountdowns();
  setInterval(updateCountdowns, 1000);
  document.body.addEventListener('htmx:afterSwap', updateCountdowns);

  function toggleAllInstanceSelection(master) {
    const root = document.getElementById('instances-table');
    if (!root) return;
    const checked = !!(master && master.checked);
    root.querySelectorAll("input[type='checkbox'][name='ids']").forEach(function (el) {
      el.checked = checked;
    });
    syncSelectionStates();
  }

  function toggleGroupSelection(master) {
    const root = document.getElementById('instances-table');
    if (!root || !master || !master.dataset) return;
    const groupIndex = master.dataset.groupSelect;
    if (typeof groupIndex === 'undefined') return;
    const checked = !!master.checked;
    master.indeterminate = false;
    root.querySelectorAll("tr[data-group-row='" + groupIndex + "'] input[type='checkbox'][name='ids']").forEach(function (el) {
      el.checked = checked;
    });
    syncSelectionStates();
  }

  function syncSelectionStates() {
    const root = document.getElementById('instances-table');
    if (!root) return;

    const rowChecks = Array.from(root.querySelectorAll("input[type='checkbox'][name='ids']"));
    const totalRows = rowChecks.length;
    const checkedRows = rowChecks.filter(function (el) { return el.checked; }).length;
    const allBox = root.querySelector("input[type='checkbox'][data-select-all-ids]");
    if (allBox) {
      allBox.indeterminate = checkedRows > 0 && checkedRows < totalRows;
      allBox.checked = totalRows > 0 && checkedRows === totalRows;
    }

    root.querySelectorAll("input[type='checkbox'][data-group-select]").forEach(function (groupBox) {
      const idx = groupBox.dataset.groupSelect;
      const children = Array.from(root.querySelectorAll("tr[data-group-row='" + idx + "'] input[type='checkbox'][name='ids']"));
      const total = children.length;
      const checked = children.filter(function (el) { return el.checked; }).length;
      groupBox.indeterminate = checked > 0 && checked < total;
      groupBox.checked = total > 0 && checked === total;
    });
  }

  function toggleGroupRows(btn) {
    if (!btn || !btn.dataset) return;
    const groupIndex = btn.dataset.groupToggle;
    if (typeof groupIndex === 'undefined') return;
    const root = document.getElementById('instances-table');
    if (!root) return;
    const rows = root.querySelectorAll('[data-group-row=\"' + groupIndex + '\"]');
    if (!rows || rows.length === 0) return;
    const willShow = rows[0].classList.contains('hidden');
    rows.forEach(function (row) {
      if (willShow) row.classList.remove('hidden');
      else row.classList.add('hidden');
    });
    btn.dataset.groupExpanded = willShow ? '1' : '0';
    btn.textContent = willShow ? '收起' : '展开';
  }

  syncSelectionStates();
  document.body.addEventListener('htmx:afterSwap', function (e) {
    const t = e && e.detail && e.detail.target;
    if (!t || t.id !== 'instances-table') return;
    syncSelectionStates();
  });

  function jumpToInstance(id, state, view) {
    const targetID = String(id || '').trim();
    if (!targetID) return;

    function tryScroll() {
      const row = document.getElementById('inst-row-' + targetID);
      if (!row) return false;
      if (row.classList.contains('hidden')) {
        const groupIndex = row.dataset.groupRow;
        if (typeof groupIndex !== 'undefined') {
          const toggle = document.querySelector('[data-group-toggle=\"' + groupIndex + '\"]');
          if (toggle && toggle.dataset && toggle.dataset.groupExpanded !== '1') {
            toggleGroupRows(toggle);
          }
        }
      }
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      row.classList.add('row-focus');
      setTimeout(function () { row.classList.remove('row-focus'); }, 1200);
      return true;
    }

    if (tryScroll()) return;

    const targetState = String(state || '').trim();
    const viewMode = String(view || '').trim();
    if (!targetState || !viewMode) return;

    if (!window.htmx || typeof window.htmx.ajax !== 'function') {
      window.location.href = '{{mount "/admin"}}#inst-row-' + targetID;
      return;
    }

    function afterSwap(evt) {
      const t = evt && evt.detail && evt.detail.target;
      if (!t || t.id !== 'instances-table') return;
      document.body.removeEventListener('htmx:afterSwap', afterSwap);
      tryScroll();
    }
    document.body.addEventListener('htmx:afterSwap', afterSwap);
    window.htmx.ajax('GET', '{{mount "/admin/instances/table"}}?state=' + encodeURIComponent(targetState) + '&view=' + encodeURIComponent(viewMode), { target: '#instances-table', swap: 'outerHTML' });
  }

  function toggleDropdown(btn) {
    const wrap = btn.closest('.dropdown');
    if (!wrap) return;
    const menu = wrap.querySelector('.dropdown-menu');
    if (!menu) return;
    document.querySelectorAll('.dropdown-menu').forEach(function (m) {
      if (m !== menu) m.classList.add('hidden');
    });
    const opening = menu.classList.contains('hidden');
    menu.classList.toggle('hidden');
    if (opening) positionDropdownMenu(btn, menu);
  }

  function closeDropdown(el) {
    const wrap = el.closest('.dropdown');
    if (!wrap) return;
    const menu = wrap.querySelector('.dropdown-menu');
    if (!menu) return;
    menu.classList.add('hidden');
  }

  function positionDropdownMenu(btn, menu) {
    const rect = btn.getBoundingClientRect();
    const pad = 8;
    const gap = 0;
    menu.style.position = 'fixed';
    menu.style.right = 'auto';
    menu.style.bottom = 'auto';
    menu.style.left = '0px';
    menu.style.top = '0px';
    menu.style.maxHeight = '';
    menu.style.overflowY = '';
    const menuRect = menu.getBoundingClientRect();
    const left = Math.max(
      pad,
      Math.min(window.innerWidth - menuRect.width - pad, rect.left),
    );
    const spaceBelow = window.innerHeight - rect.bottom - pad - gap;
    const spaceAbove = rect.top - pad - gap;
    const shouldPlaceBelow = spaceBelow >= menuRect.height || spaceBelow >= spaceAbove;
    const availableSpace = shouldPlaceBelow ? spaceBelow : spaceAbove;
    if (availableSpace < menuRect.height) {
      menu.style.maxHeight = Math.max(0, availableSpace) + 'px';
      menu.style.overflowY = 'auto';
    }
    const finalRect = menu.getBoundingClientRect();
    const top = shouldPlaceBelow
      ? rect.bottom + gap
      : rect.top - gap - finalRect.height;
    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
  }

  document.addEventListener('click', function (e) {
    if (e.target.closest('.dropdown')) return;
    document.querySelectorAll('.dropdown-menu').forEach(function (m) { m.classList.add('hidden'); });
  });

  window.addEventListener('scroll', function () {
    document.querySelectorAll('.dropdown-menu').forEach(function (m) { m.classList.add('hidden'); });
  }, true);
</script>
</body>
</html>
