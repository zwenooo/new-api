<!doctype html>
<html lang="zh" class="dark">
  <head>
    <meta charset="utf-8" />
    <link
      rel="icon"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAuMBg6OaitQAAAAASUVORK5CYII="
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#262624" />
    <meta
      name="description"
      content="OpenAI 接口聚合管理，支持多种渠道包括 Azure，可用于二次分发管理 key，仅单可执行文件，已打包好 Docker 镜像，一键部署，开箱即用"
    />
    <title></title>
    <script>
      (function () {
        try {
          var storedName = window.localStorage.getItem('system_name');
          if (storedName) {
            document.title = storedName;
          }
          var storedLogo = window.localStorage.getItem('logo');
          if (storedLogo) {
            var favicon = document.querySelector("link[rel~='icon']");
            if (!favicon) {
              favicon = document.createElement('link');
              favicon.rel = 'icon';
              document.head.appendChild(favicon);
            }
            favicon.href = storedLogo;
          }
        } catch (error) {
          console.warn('无法预加载系统名称或图标', error);
        }
      })();
    </script>
  </head>

  <body theme-mode="dark">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
